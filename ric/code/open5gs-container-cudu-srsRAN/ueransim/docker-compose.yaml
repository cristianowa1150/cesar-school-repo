services:
  ueransim:
    image: gradiant/ueransim:3.2.6
    container_name: ueransim
    hostname: ueransim
    working_dir: /ueransim
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    command: []
    networks:
      open5gs-container-srsran_net-n2:
        ipv4_address: 10.20.0.102
      open5gs-container-srsran_net-n3:
        ipv4_address: 10.30.0.11
    volumes:
      - ./configs/entrypoint.sh:/entrypoint.sh:ro
      - ./configs/gnb.yaml:/etc/ueransim/gnb.yaml
      - ./configs/ue.yaml:/etc/ueransim/ue.yaml
      - ../logs/ueransim:/ueransim/logs
    privileged: true
    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "ip a | grep -q uesimtun"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  open5gs-container-srsran_net-n2:
    external: true
  open5gs-container-srsran_net-n3:
    external: true