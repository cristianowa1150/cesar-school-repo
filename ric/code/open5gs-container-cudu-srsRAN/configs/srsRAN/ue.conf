# srsRAN 4G srsUE - 5G SA NR com ZMQ
# Formato: libconfig (.conf)
# Ref: https://docs.srsran.com/projects/4g/en/latest/app_notes/source/5g_sa_E2E/
# Ref: https://github.com/s5uishida/open5gs_5gc_srsran_sample_config
#
# ZMQ: tx 2001, rx 2000 - conecta com srsRAN DU (tx 2000, rx 2001)
# PLMN: 001/01 | TAC: 7 | DNN: internet | Subnet UE: 10.60.0.0/16

[rf]
freq_offset = 0
tx_gain = 80
rx_gain = 80
srate = 23.04e6
nof_antennas = 1
device_name = zmq
device_args = tx_port=tcp://*:2001,rx_port=tcp://srsran-du:2000,id=ue,base_srate=23.04e6

[rat.eutra]
dl_earfcn = 2850
nof_carriers = 0

[rat.nr]
# Alinhar com cell 20 MHz / band 3 (mesma ordem de grandeza que gNB)
bands = 3
nof_carriers = 1
max_nof_prb = 106
nof_prb = 106

[rrc]
release = 15
ue_category = 4

[usim]
mode = soft
algo = milenage
opc = E8ED289DEBA952E4283B54E88E6183B8
k = 465B5CE8B199B49FAA5F0A2EE238A6B0
imsi = 001010000000003
imei = 353490069873319

[nas]
apn = internet
apn_protocol = ipv4

[gw]
ip_devname = tun_srsue
ip_netmask = 255.255.255.0
# netns = ue1  # Descomente se usar network namespace no host
