# srsUE — exemplo para free5GC (subscriber add-subscriber.sh)
# IMSI 208930000000001, DNN internet, ZMQ para gNB (2000/2001).
# Destino: container srsran-gnb-tradicional (gNB com gnb-zmq-srsue.yml).
# Docker publica só 2000 (DL). A 2001 fica no host para o srsUE (bind); não mapear 2001 no compose.

[rf]
device_name = zmq
# Um só portador NR: tx_port0/rx_port0 evita «Opening 2 channels» em srsUE 23.x.
device_args = tx_port0=tcp://0.0.0.0:2001,rx_port0=tcp://127.0.0.1:2000,id=ue,base_srate=23.04e6
srate = 23.04e6
nof_antennas = 1

# 5G SA: LTE com 0 portadoras. dl_earfcn é exigido pelo parser em várias versões
# (doc 5G SA E2E srsRAN), senão nof_lte pode ficar em default 1 ⇒ 2 canais ZMQ.
[rat.eutra]
dl_earfcn = 3350
nof_carriers = 0

[usim]
mode = soft
algo = milenage
opc = 8e27b6af0e692e750f32667a3b14605d
k = 8baf473f2f8fd09487cccbd7097c6862
imsi = 208930000000001
imei = 353490069873319

[rat.nr]
# Deve coincidir com cell_cfg do gNB (band 3 FDD + SCS 15 kHz no gnb-zmq-srsue.yml).
bands = 3
nof_carriers = 1
max_nof_prb = 106
nof_prb = 106
scs = 15
dl_nr_arfcn = 368500
ssb_nr_arfcn = 368410

[log]
all_level = info
filename = /tmp/srsue_gnb_trad.log
file_max_size = -1

[rrc]
release = 15
ue_category = 4

[nas]
apn = internet
apn_protocol = ipv4

# Opcional: network namespace para isolar interface do UE
# [gw]
# netns = ue1
# ip_devname = tun_srsue
# ip_netmask = 255.255.255.0
